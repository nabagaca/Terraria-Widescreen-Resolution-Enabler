name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build src/WidescreenTools/WidescreenTools.csproj -c Release

      - name: Package
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "dev-${{ github.run_number }}" }
          $stageRoot = Join-Path $PWD "artifacts\release\widescreen-tools"
          New-Item -ItemType Directory -Force -Path $stageRoot | Out-Null
          Copy-Item "artifacts\bin\WidescreenTools.dll" $stageRoot
          Copy-Item "src\WidescreenTools\manifest.json" $stageRoot
          $zipPath = Join-Path $PWD "artifacts\Terraria-Widescreen-Resolution-Enabler-$version.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path $stageRoot -DestinationPath $zipPath
          "ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: widescreen-tools-release
          path: ${{ env.ZIP_PATH }}

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
